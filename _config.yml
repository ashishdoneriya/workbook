author: "Ashish Doneriya"

twitter: 
  username: ashishdoneriya
  
social:
  name: Ashish Doneriya
  links:
    - https://twitter.com/ashishdoneriya
    - https://www.instagram/ashishdoneriya
    - https://www.facebook.com/ashishdoneriya

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
