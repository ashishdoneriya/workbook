---
layout : default
---
<div class="article-page ">
	<article class="article">
		<div class="article-header">
			<h1 class="article-title">{{ page.title }}</h1>
			<div class="article-meta">
				<div class="categories-list" style="margin-top:20px !important;">
					<i class="fas fa-tag meta-icon"></i>
					By : {{page.author}} on {{page.date}}
				</div>
			</div>
		</div>
		<div class="article-body  text-block ">
			<div class="article-content">

				{{content}}

			</div>
			<div class="related-posts">
				<h2>You might also enjoy:</h2>
				<ul>
						{% for related_post in site.related_posts %}
					<li class="related-post-item">
						<a href="{{ related_post.url | prepend: site.baseurl }}">{{ related_post.title}}</a>
					</li>
					{% endfor %}
				</ul>
			</div>
			<hr class="light-hr">
			<h2>Comments</h2>
			<script></script>
		</div>
	</article>
	</div>
</div>
